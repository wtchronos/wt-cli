project_name: wt

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/wtchronos/wt-cli/cmd.version={{.Version}} -X github.com/wtchronos/wt-cli/cmd.commit={{.Commit}} -X github.com/wtchronos/wt-cli/cmd.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: wtchronos
    name: wt-cli
  extra_files:
    - glob: install.sh
